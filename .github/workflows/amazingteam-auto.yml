name: AmazingTeam Auto

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]
  pull_request:
    types: [closed]

env:
  OPENCODE_MODEL: bailian-coding-plan/glm-5

jobs:
  triage:
    if: "(github.event_name == 'issue_comment' && (startsWith(github.event.comment.body, '/ai') || startsWith(github.event.comment.body, '/oc') || startsWith(github.event.comment.body, '/opencode'))) || (github.event_name == 'issues' && github.event.label.name == 'ai:process')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      needs_decomposition: ${{ steps.analyze.outputs.needs_decomposition }}
      parent_issue: ${{ steps.analyze.outputs.parent_issue }}
      commit_mode: ${{ steps.config.outputs.commit_mode }}
    permissions:
      issues: write
      contents: read
    steps:
      - name: "Start"
        run: |
          echo "============================================"
          echo "  AmazingTeam Auto-Decomposition Workflow"
          echo "============================================"
          echo "Event: ${{ github.event_name }}"
          echo "Repo: ${{ github.repository }}"

      - name: "React"
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: "gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content='eyes' || true"

      - uses: actions/checkout@v4

      - uses: Burburton/amazingteam-action@v3.0.23
        with:
          version: '3.0.23'

      - name: "Read Config"
        id: config
        run: |
          echo "Reading workflow configuration..."
          
          if [ -f "amazingteam.config.yaml" ]; then
            MODE=$(grep -A5 "workflow:" amazingteam.config.yaml 2>/dev/null | grep "commit_mode:" | head -1 | awk '{print $2}' | tr -d '"' || echo "pr")
          elif [ -f "amazing-team.config.yaml" ]; then
            MODE=$(grep -A5 "workflow:" amazing-team.config.yaml 2>/dev/null | grep "commit_mode:" | head -1 | awk '{print $2}' | tr -d '"' || echo "pr")
          else
            MODE="pr"
          fi
          
          echo "Commit Mode: $MODE"
          echo "commit_mode=$MODE" >> $GITHUB_OUTPUT

      - name: "Analyze"
        id: analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          echo ""
          echo "=== PHASE 1: TRIAGE ==="
          echo ""
          echo "Fetching issue #$ISSUE_NUM..."
          
          DATA=$(gh issue view "$ISSUE_NUM" --json title,body)
          TITLE=$(echo "$DATA" | jq -r '.title')
          BODY=$(echo "$DATA" | jq -r '.body')
          
          echo "Title: $TITLE"
          echo "Body length: $(echo "$BODY" | wc -c) chars"
          
          ANALYSIS_CONTENT="$TITLE\n\n$BODY"
          REFERENCED_FILES=""
          
          echo ""
          echo "=== Checking for referenced files ==="
          
          REF_PATHS=$(echo "$BODY" | grep -oE '[a-zA-Z0-9_/.-]+\.(md|txt|yaml|yml|json)' | sort -u || echo "")
          
          for ref in $REF_PATHS; do
            if [ -f "$ref" ]; then
              echo "Found referenced file: $ref"
              FILE_LINES=$(wc -l < "$ref")
              FILE_SIZE=$(wc -c < "$ref")
              echo "  Lines: $FILE_LINES, Size: $FILE_SIZE bytes"
              
              if [ "$FILE_LINES" -gt 100 ]; then
                echo "  Content preview (first 50 lines):"
                head -50 "$ref" | sed 's/^/    /'
                echo "  ... (truncated, total $FILE_LINES lines)"
              else
                echo "  Full content:"
                cat "$ref" | sed 's/^/    /'
              fi
              
              REFERENCED_FILES="$REFERENCED_FILES\nFile: $ref ($FILE_LINES lines)\n$(head -200 "$ref")\n"
              ANALYSIS_CONTENT="$ANALYSIS_CONTENT\n\n--- Referenced File: $ref ---\n$(head -500 "$ref")"
            fi
          done
          
          if [ -z "$REFERENCED_FILES" ]; then
            echo "No referenced files found in issue body"
          fi
          
          echo ""
          echo "=== Analyzing complexity ==="
          
          FUNCTIONAL_AREAS=0
          
          if echo "$ANALYSIS_CONTENT" | grep -qiE "database|storage|persistence|model"; then
            FUNCTIONAL_AREAS=$((FUNCTIONAL_AREAS + 1))
            echo "  + Database/Storage detected"
          fi
          if echo "$ANALYSIS_CONTENT" | grep -qiE "api|endpoint|rest|graphql|backend"; then
            FUNCTIONAL_AREAS=$((FUNCTIONAL_AREAS + 1))
            echo "  + API/Backend detected"
          fi
          if echo "$ANALYSIS_CONTENT" | grep -qiE "frontend|ui|web|react|vue|component"; then
            FUNCTIONAL_AREAS=$((FUNCTIONAL_AREAS + 1))
            echo "  + Frontend/UI detected"
          fi
          if echo "$ANALYSIS_CONTENT" | grep -qiE "auth|login|user|permission|security"; then
            FUNCTIONAL_AREAS=$((FUNCTIONAL_AREAS + 1))
            echo "  + Authentication/User detected"
          fi
          if echo "$ANALYSIS_CONTENT" | grep -qiE "integration|external|third.?party|api.*client"; then
            FUNCTIONAL_AREAS=$((FUNCTIONAL_AREAS + 1))
            echo "  + External Integration detected"
          fi
          if echo "$ANALYSIS_CONTENT" | grep -qiE "test|testing|qa|coverage"; then
            FUNCTIONAL_AREAS=$((FUNCTIONAL_AREAS + 1))
            echo "  + Testing infrastructure detected"
          fi
          if echo "$ANALYSIS_CONTENT" | grep -qiE "deploy|ci|cd|pipeline|infrastructure"; then
            FUNCTIONAL_AREAS=$((FUNCTIONAL_AREAS + 1))
            echo "  + DevOps/Infrastructure detected"
          fi
          
          CONTENT_LINES=$(echo -e "$ANALYSIS_CONTENT" | wc -l)
          echo ""
          echo "Content analysis:"
          echo "  Total lines: $CONTENT_LINES"
          echo "  Functional areas: $FUNCTIONAL_AREAS"
          
          if [ "$CONTENT_LINES" -gt 300 ] || [ "$FUNCTIONAL_AREAS" -ge 3 ]; then
            echo ""
            echo "=== AUTO-CLASSIFY: COMPLEX ==="
            echo "Reason: Content lines=$CONTENT_LINES (threshold: 300), Functional areas=$FUNCTIONAL_AREAS (threshold: 3)"
            NEEDS_DECOMP="true"
            COMPLEXITY="complex"
            EST=$((FUNCTIONAL_AREAS + 1))
            REASON="Large scope: $CONTENT_LINES lines of requirements, $FUNCTIONAL_AREAS functional areas"
          else
            echo ""
            echo "Analyzing with AI model: $OPENCODE_MODEL"
            
            PROMPT="Classify this GitHub issue. Respond with ONLY a JSON object (no markdown): {\"complexity\":\"simple\" or \"complex\",\"needs_decomposition\":true or false,\"estimated_subtasks\":0-5,\"reason\":\"brief\"}. Content lines: $CONTENT_LINES. Functional areas detected: $FUNCTIONAL_AREAS. Issue Title: $TITLE. Issue Body excerpt: $(echo -e "$ANALYSIS_CONTENT" | head -100 | tr '\n' ' ')"
            
            RESULT=$(opencode run --model "$OPENCODE_MODEL" "$PROMPT" 2>&1 || echo '{}')
            
            echo "AI Response (first 300 chars):"
            echo "$RESULT" | head -c 300
            echo ""
            
            JSON=$(echo "$RESULT" | grep -oP '\{[^{}]*\}' | tail -1 || echo '{}')
            
            NEEDS_DECOMP=$(echo "$JSON" | jq -r '.needs_decomposition // false')
            COMPLEXITY=$(echo "$JSON" | jq -r '.complexity // "simple"')
            EST=$(echo "$JSON" | jq -r '.estimated_subtasks // 0')
            REASON=$(echo "$JSON" | jq -r '.reason // "N/A"')
          fi
          
          echo ""
          echo "=== ANALYSIS RESULT ==="
          echo "  Complexity: $COMPLEXITY"
          echo "  Decomposition: $NEEDS_DECOMP"
          echo "  Est. Subtasks: $EST"
          echo "  Reason: $REASON"
          echo ""
          
          echo "needs_decomposition=$NEEDS_DECOMP" >> $GITHUB_OUTPUT
          echo "parent_issue=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
          gh issue edit "$ISSUE_NUM" --add-label "complexity:$COMPLEXITY" || true
          
          if [ "$NEEDS_DECOMP" = "true" ]; then
            echo "Decision: COMPLEX -> Will decompose"
            gh issue comment "$ISSUE_NUM" --body "## Triage: Complex Task\n\nComplexity: $COMPLEXITY\nContent Lines: $CONTENT_LINES\nFunctional Areas: $FUNCTIONAL_AREAS\nDecomposition: Required\nEst. Subtasks: $EST\nReason: $REASON\n\nCreating sub-issues..."
          else
            echo "Decision: SIMPLE -> Direct execution"
            gh issue comment "$ISSUE_NUM" --body "## Triage: Simple Task\n\nComplexity: $COMPLEXITY\nReason: $REASON\n\nExecuting directly..."
          fi

  decompose:
    needs: triage
    if: needs.triage.outputs.needs_decomposition == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      first_subtask: ${{ steps.create.outputs.first_subtask }}
      subtask_count: ${{ steps.create.outputs.subtask_count }}
      all_subtasks: ${{ steps.create.outputs.all_subtasks }}
    permissions:
      issues: write
      contents: write
    steps:
      - name: "Start Decomposition"
        run: "echo '=== PHASE 2: DECOMPOSITION ==='"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - uses: Burburton/amazingteam-action@v3.0.23
        with:
          version: '3.0.23'

      - name: "Create Sub-Issues"
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          PARENT_NUM: ${{ needs.triage.outputs.parent_issue }}
        run: |
          echo ""
          echo "Fetching parent #$PARENT_NUM..."
          
          DATA=$(gh issue view "$PARENT_NUM" --json title,body)
          TITLE=$(echo "$DATA" | jq -r '.title')
          BODY=$(echo "$DATA" | jq -r '.body')
          
          echo "Parent: $TITLE"
          echo ""
          echo "Decomposing with AI..."
          
          # Create prompt with escaped content
          PROMPT="Decompose this task into 2-4 subtasks. Respond with ONLY a JSON object (no markdown): {\"subtasks\":[{\"title\":\"[Subtask] Title\",\"role\":\"architect\" or \"developer\" or \"qa\",\"priority\":1-4}]}. Task: $TITLE. Description: $(echo "$BODY" | head -c 500 | tr '\n' ' ' | tr -d '\"')"
          
          # Escape the prompt for JSON
          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -Rs '.')
          
          # Use Bailian/Anthropic compatible API
          RESULT=$(curl -s -X POST "https://coding.dashscope.aliyuncs.com/apps/anthropic/v1/messages" \
            -H "x-api-key: $AMAZINGTEAM_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"qwen3.5-plus\",
              \"max_tokens\": 1000,
              \"messages\": [{\"role\": \"user\", \"content\": $ESCAPED_PROMPT}]
            }" 2>&1 || echo '{"content":[{"text":"{\"subtasks\":[]}"}]}')
          
          echo "AI Response (first 500 chars):"
          echo "$RESULT" | head -c 500
          echo ""
          
          # Extract content from Anthropic API response
          CONTENT=$(echo "$RESULT" | jq -r '.content[0].text // "{\"subtasks\":[]}"' 2>/dev/null || echo '{"subtasks":[]}')
          JSON=$(echo "$CONTENT" | grep -oP '\{"subtasks".*\}' | head -1 || echo '{"subtasks":[]}')
          
          echo ""
          echo "=== DECOMPOSITION PLAN ==="
          echo "$JSON" | jq -r '.subtasks[]? | "  - \(.title) (\(.role), priority \(.priority // 1))"' 2>/dev/null || echo "  (Could not parse plan)"
          echo ""
          
          FIRST=""
          COUNT=0
          ALL_ISSUES="[]"
          
          echo "Creating GitHub issues..."
          
          for row in $(echo "$JSON" | jq -r '.subtasks[]? | @base64' 2>/dev/null); do
            ST_TITLE=$(echo "$row" | base64 -d | jq -r '.title')
            ST_ROLE=$(echo "$row" | base64 -d | jq -r '.role')
            ST_PRIO=$(echo "$row" | base64 -d | jq -r '.priority // 1')
            
            URL=$(gh issue create --title "$ST_TITLE" --body "Parent: #$PARENT_NUM\nRole: $ST_ROLE\nPriority: $ST_PRIO" --label "type:subtask,role:$ST_ROLE,status:pending" 2>/dev/null || echo "")
            
            if [ -n "$URL" ]; then
              ST_NUM=$(echo "$URL" | grep -oP '\d+$')
              echo "  Created #$ST_NUM: $ST_TITLE"
              
              ALL_ISSUES=$(echo "$ALL_ISSUES" | jq --arg num "$ST_NUM" '. + [$num]')
              
              if [ -z "$FIRST" ]; then
                FIRST="$ST_NUM"
              fi
              COUNT=$((COUNT + 1))
            fi
          done
          
          echo ""
          echo "=== SUMMARY ==="
          echo "Total subtasks: $COUNT"
          echo "First to execute: #$FIRST"
          echo "All issues: $ALL_ISSUES"
          
          echo "first_subtask=$FIRST" >> $GITHUB_OUTPUT
          echo "subtask_count=$COUNT" >> $GITHUB_OUTPUT
          echo "all_subtasks=$ALL_ISSUES" >> $GITHUB_OUTPUT
          
          gh issue comment "$PARENT_NUM" --body "## Decomposed: $COUNT subtasks\n\nStarting with first subtask..."

  execute-direct:
    needs: triage
    if: always() && needs.triage.result == 'success' && needs.triage.outputs.needs_decomposition != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - name: "Start Execution"
        run: "echo '=== PHASE 2: DIRECT EXECUTION ==='"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - name: "Run OpenCode"
        uses: anomalyco/opencode/github@latest
        env:
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: bailian-coding-plan/glm-5
          use_github_token: true

      - name: "Complete"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ needs.triage.outputs.parent_issue }}
          COMMIT_MODE: ${{ needs.triage.outputs.commit_mode }}
        run: |
          echo ""
          echo "=== EXECUTION COMPLETE ==="
          echo "Commit Mode: $COMMIT_MODE"
          
          if [ "$COMMIT_MODE" = "direct" ]; then
            echo "Direct mode: changes committed directly"
            gh issue comment "$ISSUE_NUM" --body "## Done\n\nChanges committed directly to branch.\n\nCommit Mode: direct"
          else
            PR=$(gh pr list --author opencode-bot --state open --json url,title,number -q '.[0]' 2>/dev/null || echo "")
            
            if [ -n "$PR" ] && [ "$PR" != "null" ]; then
              PR_URL=$(echo "$PR" | jq -r '.url')
              PR_NUM=$(echo "$PR" | jq -r '.number')
              
              echo "PR Created: #$PR_NUM"
              echo "URL: $PR_URL"
              
              gh issue comment "$ISSUE_NUM" --body "## Done\n\nPR: #$PR_NUM\n$PR_URL\n\nWill auto-close on merge."
            else
              echo "No PR created"
              gh issue comment "$ISSUE_NUM" --body "## Done\n\nNo PR created. Check logs."
            fi
          fi

  execute-subtask:
    needs: [triage, decompose]
    if: always() && needs.decompose.result == 'success' && needs.decompose.outputs.first_subtask != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      executed_subtask: ${{ steps.update.outputs.executed_subtask }}
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - name: "Start Subtask"
        run: |
          echo "=== PHASE 3: EXECUTE SUBTASK ==="
          echo "Subtask: ${{ needs.decompose.outputs.first_subtask }}"
          echo "Total: ${{ needs.decompose.outputs.subtask_count }}"
          echo "Commit Mode: ${{ needs.triage.outputs.commit_mode }}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - name: "Run OpenCode"
        uses: anomalyco/opencode/github@latest
        env:
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: bailian-coding-plan/glm-5
          use_github_token: true

      - name: "Update"
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBTASK_NUM: ${{ needs.decompose.outputs.first_subtask }}
          PARENT_NUM: ${{ needs.triage.outputs.parent_issue }}
          TOTAL: ${{ needs.decompose.outputs.subtask_count }}
          COMMIT_MODE: ${{ needs.triage.outputs.commit_mode }}
        run: |
          echo ""
          echo "=== SUBTASK COMPLETE ==="
          echo "Commit Mode: $COMMIT_MODE"
          
          gh issue edit "$SUBTASK_NUM" --add-label "status:done" || true
          echo "executed_subtask=$SUBTASK_NUM" >> $GITHUB_OUTPUT
          
          if [ "$COMMIT_MODE" = "direct" ]; then
            echo "Direct mode: changes committed directly"
            gh issue comment "$SUBTASK_NUM" --body "## Done\n\nChanges committed directly."
            gh issue comment "$PARENT_NUM" --body "## Subtask #$SUBTASK_NUM Done\n\nProgress: 1/$TOTAL\nMode: direct (auto-continue)\n\nTriggering next subtask..."
          else
            PR=$(gh pr list --author opencode-bot --state open --json url,number -q '.[0]' 2>/dev/null || echo "")
            
            if [ -n "$PR" ] && [ "$PR" != "null" ]; then
              PR_URL=$(echo "$PR" | jq -r '.url')
              PR_NUM=$(echo "$PR" | jq -r '.number')
              
              echo "PR: #$PR_NUM"
              
              gh issue comment "$SUBTASK_NUM" --body "## Done\n\nPR: #$PR_NUM\n$PR_URL"
              gh issue comment "$PARENT_NUM" --body "## Subtask #$SUBTASK_NUM Done\n\nProgress: 1/$TOTAL\nPR: #$PR_NUM\n\nNext auto-starts on merge."
            else
              echo "No PR created"
              gh issue comment "$SUBTASK_NUM" --body "## Done\n\nNo PR. Check logs."
            fi
          fi

  continue-direct:
    needs: [triage, decompose, execute-subtask]
    if: always() && needs.triage.outputs.commit_mode == 'direct' && needs.execute-subtask.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: "Check and Continue"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PARENT: ${{ needs.triage.outputs.parent_issue }}
          DONE_SUBTASK: ${{ needs.execute-subtask.outputs.executed_subtask }}
          ALL_SUBTASKS: ${{ needs.decompose.outputs.all_subtasks }}
        run: |
          echo ""
          echo "=== DIRECT MODE: AUTO-CONTINUE ==="
          echo "Parent: #$PARENT"
          echo "Just completed: #$DONE_SUBTASK"
          echo ""
          
          echo "Checking remaining subtasks..."
          
          OPEN=$(gh issue list --label "type:subtask" --state open --json number,body 2>/dev/null || echo "[]")
          FILTERED=$(echo "$OPEN" | jq --arg parent "$PARENT" '[.[] | select(.body | test("Parent: #" + $parent; "i"))]')
          COUNT=$(echo "$FILTERED" | jq 'length')
          
          echo "Remaining open subtasks: $COUNT"
          
          if [ "$COUNT" -eq 0 ]; then
            echo ""
            echo "=== ALL SUBTASKS COMPLETE ==="
            echo "Closing parent #$PARENT"
            gh issue close "$PARENT" --comment "## All Subtasks Complete\n\nAll sub-issues resolved in direct mode."
          else
            NEXT=$(echo "$FILTERED" | jq -r '.[0].number')
            echo ""
            echo "Next subtask: #$NEXT"
            echo "Triggering next subtask workflow..."
            
            gh issue comment "$PARENT" --body "## Auto-continuing to Subtask #$NEXT\n\nDirect mode: no PR merge required."
            
            gh workflow run amazingteam-subtask.yml \
              -f subtask_issue=$NEXT \
              -f parent_issue=$PARENT \
              -f commit_mode=direct
            
            echo "Workflow triggered"
          fi

  on-pr-merge:
    if: "github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.user.login == 'opencode-bot'"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      contents: write
      actions: write
    steps:
      - name: "PR Merged"
        run: |
          echo "=== PR MERGE EVENT ==="
          echo "PR: ${{ github.event.pull_request.number }}"
          echo "By: ${{ github.event.pull_request.merged_by.login }}"
          echo "Author: ${{ github.event.pull_request.user.login }}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Find Issues"
        id: find
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "Finding related issues..."
          echo "PR Body (first 500 chars):"
          echo "$PR_BODY" | head -c 500
          echo ""
          
          SUBTASK=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "")
          
          if [ -n "$SUBTASK" ]; then
            echo "Found subtask: #$SUBTASK"
            echo "subtask_issue=$SUBTASK" >> $GITHUB_OUTPUT
            
            DATA=$(gh issue view "$SUBTASK" --json body 2>/dev/null || echo "{}")
            PARENT=$(echo "$DATA" | grep -oiE 'parent: #[0-9]+' | grep -oE '[0-9]+' || echo "")
            
            if [ -n "$PARENT" ]; then
              echo "Found parent: #$PARENT"
              echo "parent_issue=$PARENT" >> $GITHUB_OUTPUT
            else
              echo "No parent found in subtask body"
              echo "parent_issue=" >> $GITHUB_OUTPUT
            fi
            
            echo "Closing subtask #$SUBTASK..."
            gh issue close "$SUBTASK" --comment "Merged in PR #$PR_NUM"
          else
            echo "No subtask found in PR body"
            echo "subtask_issue=" >> $GITHUB_OUTPUT
            echo "parent_issue=" >> $GITHUB_OUTPUT
          fi

      - name: "Check Remaining"
        id: check
        if: steps.find.outputs.parent_issue != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PARENT: ${{ steps.find.outputs.parent_issue }}
        run: |
          echo ""
          echo "Checking remaining subtasks for parent #$PARENT..."
          
          OPEN=$(gh issue list --label "type:subtask" --state open --json number,title,body 2>/dev/null || echo "[]")
          
          FILTERED=$(echo "$OPEN" | jq --arg parent "$PARENT" '[.[] | select(.body | test("Parent: #" + $parent; "i"))]')
          COUNT=$(echo "$FILTERED" | jq 'length')
          
          echo "Remaining open subtasks: $COUNT"
          
          echo "open_count=$COUNT" >> $GITHUB_OUTPUT
          
          if [ "$COUNT" -eq 0 ]; then
            echo "ALL DONE!"
            echo "all_done=true" >> $GITHUB_OUTPUT
          else
            NEXT=$(echo "$FILTERED" | jq -r '.[0].number')
            echo "Next subtask: #$NEXT"
            echo "all_done=false" >> $GITHUB_OUTPUT
            echo "next_subtask=$NEXT" >> $GITHUB_OUTPUT
          fi

      - name: "Close Parent"
        if: steps.check.outputs.all_done == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PARENT: ${{ steps.find.outputs.parent_issue }}
        run: |
          echo ""
          echo "=== ALL SUBTASKS COMPLETE ==="
          echo "Closing parent #$PARENT"
          
          gh issue close "$PARENT" --comment "## All Subtasks Complete\n\nAll sub-issues resolved and merged."

      - name: "Execute Next"
        if: steps.check.outputs.all_done == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PARENT: ${{ steps.find.outputs.parent_issue }}
          NEXT: ${{ steps.check.outputs.next_subtask }}
        run: |
          echo ""
          echo "=== AUTO-START NEXT SUBTASK ==="
          echo "Parent: #$PARENT"
          echo "Next: #$NEXT"
          
          gh issue comment "$PARENT" --body "## Starting Subtask #$NEXT\n\nAuto-triggered after PR merge."
          
          echo "Triggering amazingteam-subtask workflow..."
          gh workflow run amazingteam-subtask.yml -f subtask_issue=$NEXT -f parent_issue=$PARENT -f commit_mode=pr
          
          echo "Workflow triggered successfully"