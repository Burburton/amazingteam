name: AmazingTeam Auto

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled, closed]
  pull_request:
    types: [closed]

env:
  OPENCODE_MODEL: bailian-coding-plan/glm-5
  MAX_PARALLEL: 3

jobs:
  planner:
    if: |
      github.event_name == 'issues' && github.event.label.name == 'ai:process' ||
      github.event_name == 'issue_comment' && contains(github.event.comment.body, '/ai') ||
      github.event_name == 'issue_comment' && contains(github.event.comment.body, '/oc') ||
      github.event_name == 'issue_comment' && contains(github.event.comment.body, '/opencode') ||
      github.event_name == 'pull_request' && github.event.pull_request.merged == true ||
      github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      action: ${{ steps.decide.outputs.action }}
      issue_num: ${{ steps.decide.outputs.issue_num }}
      parent_issue: ${{ steps.decide.outputs.parent_issue }}
      commit_mode: ${{ steps.config.outputs.commit_mode }}
      ready_subtasks: ${{ steps.decide.outputs.ready_subtasks }}
    permissions:
      issues: write
      contents: read
      pull-requests: read
    steps:
      - name: "Planner Start"
        run: |
          echo "============================================"
          echo "  AmazingTeam Planner - Orchestrator"
          echo "============================================"
          echo "Event: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"

      - uses: actions/checkout@v4

      - name: "Read Config"
        id: config
        run: |
          if [ -f "amazingteam.config.yaml" ]; then
            MODE=$(grep -A10 "workflow:" amazingteam.config.yaml 2>/dev/null | grep "commit_mode:" | head -1 | awk '{print $2}' | tr -d '"' || echo "pr")
            MAX_PAR=$(grep -A10 "workflow:" amazingteam.config.yaml 2>/dev/null | grep "max_concurrent:" | head -1 | awk '{print $2}' || echo "3")
          else
            MODE="pr"
            MAX_PAR="3"
          fi
          echo "Commit Mode: $MODE"
          echo "Max Parallel: $MAX_PAR"
          echo "commit_mode=$MODE" >> $GITHUB_OUTPUT
          echo "max_parallel=$MAX_PAR" >> $GITHUB_OUTPUT

      - name: "Decide Action"
        id: decide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ""
          echo "=== ANALYZING EVENT ==="
          
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          
          case "$EVENT" in
            issue_comment)
              ISSUE_NUM="${{ github.event.issue.number }}"
              COMMENT="${{ github.event.comment.body }}"
              
              echo "Issue: #$ISSUE_NUM"
              echo "Comment: $COMMENT"
              
              DATA=$(gh issue view "$ISSUE_NUM" --json title,body,labels 2>/dev/null || echo '{}')
              TITLE=$(echo "$DATA" | jq -r '.title // "Unknown"')
              IS_SUBTASK=$(echo "$DATA" | jq -r '.body // ""' | grep -qi "parent: #" && echo "true" || echo "false")
              
              echo "Title: $TITLE"
              echo "Is Subtask: $IS_SUBTASK"
              
              if [ "$IS_SUBTASK" = "true" ]; then
                PARENT=$(echo "$DATA" | jq -r '.body // ""' | grep -oiE 'parent: #[0-9]+' | grep -oE '[0-9]+' | head -1)
                echo "Parent: #$PARENT"
                echo "action=execute_subtask" >> $GITHUB_OUTPUT
                echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
                echo "parent_issue=$PARENT" >> $GITHUB_OUTPUT
              else
                echo "action=triage" >> $GITHUB_OUTPUT
                echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
                echo "parent_issue=$ISSUE_NUM" >> $GITHUB_OUTPUT
              fi
              ;;
              
            issues)
              if [ "$ACTION" = "labeled" ] && [ "${{ github.event.label.name }}" = "ai:process" ]; then
                ISSUE_NUM="${{ github.event.issue.number }}"
                echo "Label trigger on #$ISSUE_NUM"
                echo "action=triage" >> $GITHUB_OUTPUT
                echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
                echo "parent_issue=$ISSUE_NUM" >> $GITHUB_OUTPUT
              elif [ "$ACTION" = "closed" ]; then
                ISSUE_NUM="${{ github.event.issue.number }}"
                echo "Issue #$ISSUE_NUM closed - checking for parent"
                
                DATA=$(gh issue view "$ISSUE_NUM" --json body 2>/dev/null || echo '{}')
                PARENT=$(echo "$DATA" | jq -r '.body // ""' | grep -oiE 'parent: #[0-9]+' | grep -oE '[0-9]+' | head -1)
                
                if [ -n "$PARENT" ]; then
                  echo "Subtask closed, checking parent #$PARENT for more work"
                  echo "action=check_parent" >> $GITHUB_OUTPUT
                  echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
                  echo "parent_issue=$PARENT" >> $GITHUB_OUTPUT
                else
                  echo "Parent issue closed, no action needed"
                  echo "action=none" >> $GITHUB_OUTPUT
                fi
              else
                echo "action=none" >> $GITHUB_OUTPUT
              fi
              ;;
              
            pull_request)
              PR_NUM="${{ github.event.pull_request.number }}"
              PR_BODY="${{ github.event.pull_request.body }}"
              MERGED="${{ github.event.pull_request.merged }}"
              AUTHOR="${{ github.event.pull_request.user.login }}"
              
              echo "PR: #$PR_NUM"
              echo "Merged: $MERGED"
              echo "Author: $AUTHOR"
              
              if [ "$MERGED" = "true" ] && [ "$AUTHOR" = "opencode-bot" ]; then
                SUBTASK=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+' | head -1)
                
                if [ -n "$SUBTASK" ]; then
                  echo "PR closes subtask #$SUBTASK"
                  
                  DATA=$(gh issue view "$SUBTASK" --json body 2>/dev/null || echo '{}')
                  PARENT=$(echo "$DATA" | jq -r '.body // ""' | grep -oiE 'parent: #[0-9]+' | grep -oE '[0-9]+' | head -1)
                  
                  echo "action=pr_merged" >> $GITHUB_OUTPUT
                  echo "issue_num=$SUBTASK" >> $GITHUB_OUTPUT
                  echo "parent_issue=$PARENT" >> $GITHUB_OUTPUT
                else
                  echo "action=none" >> $GITHUB_OUTPUT
                fi
              else
                echo "action=none" >> $GITHUB_OUTPUT
              fi
              ;;
              
            *)
              echo "Unknown event: $EVENT"
              echo "action=none" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: "React"
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content='eyes' || true

  triage:
    needs: planner
    if: needs.planner.outputs.action == 'triage'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      needs_decomposition: ${{ steps.analyze.outputs.needs_decomposition }}
      complexity: ${{ steps.analyze.outputs.complexity }}
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: Burburton/amazingteam-action@v3.0.23
        with:
          version: '3.0.23'

      - name: "Analyze Complexity"
        id: analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          ISSUE_NUM: ${{ needs.planner.outputs.issue_num }}
        run: |
          echo "=== TRIAGE: #$ISSUE_NUM ==="
          
          DATA=$(gh issue view "$ISSUE_NUM" --json title,body)
          TITLE=$(echo "$DATA" | jq -r '.title')
          BODY=$(echo "$DATA" | jq -r '.body')
          
          echo "Title: $TITLE"
          echo "Body: $(echo "$BODY" | wc -c) chars"
          
          ANALYSIS_CONTENT="$TITLE $BODY"
          
          REF_FILES=$(echo "$BODY" | grep -oE '[a-zA-Z0-9_/.-]+\.(md|txt|yaml|yml|json)' | sort -u || echo "")
          
          for ref in $REF_FILES; do
            if [ -f "$ref" ]; then
              FILE_LINES=$(wc -l < "$ref")
              echo "Found referenced file: $ref ($FILE_LINES lines)"
              
              if [ "$FILE_LINES" -gt 50 ]; then
                ANALYSIS_CONTENT="$ANALYSIS_CONTENT $(head -200 "$ref")"
              else
                ANALYSIS_CONTENT="$ANALYSIS_CONTENT $(cat "$ref")"
              fi
            fi
          done
          
          FUNCTIONAL_AREAS=0
          
          for pattern in "database|storage" "api|backend" "frontend|ui" "auth|user" "test|qa" "deploy|ci"; do
            if echo "$ANALYSIS_CONTENT" | grep -qiE "$pattern"; then
              FUNCTIONAL_AREAS=$((FUNCTIONAL_AREAS + 1))
            fi
          done
          
          LINES=$(echo "$ANALYSIS_CONTENT" | wc -l)
          CHARS=$(echo "$ANALYSIS_CONTENT" | wc -c)
          
          echo "Analysis: $LINES lines, $CHARS chars, $FUNCTIONAL_AREAS functional areas"
          
          if [ "$LINES" -gt 200 ] || [ "$CHARS" -gt 5000 ] || [ "$FUNCTIONAL_AREAS" -ge 3 ]; then
            NEEDS_DECOMP="true"
            COMPLEXITY="complex"
            REASON="$LINES lines, $CHARS chars, $FUNCTIONAL_AREAS functional areas"
          else
            NEEDS_DECOMP="false"
            COMPLEXITY="simple"
            REASON="Small scope"
          fi
          
          echo "Complexity: $COMPLEXITY"
          echo "Decomposition: $NEEDS_DECOMP"
          
          echo "needs_decomposition=$NEEDS_DECOMP" >> $GITHUB_OUTPUT
          echo "complexity=$COMPLEXITY" >> $GITHUB_OUTPUT
          
          gh issue edit "$ISSUE_NUM" --add-label "complexity:$COMPLEXITY" || true
          
          if [ "$NEEDS_DECOMP" = "true" ]; then
            gh issue comment "$ISSUE_NUM" --body "## Triage: Complex\n\n$REASON\n\nDecomposing into subtasks..."
          else
            gh issue comment "$ISSUE_NUM" --body "## Triage: Simple\n\nExecuting directly..."
          fi

  decompose:
    needs: [planner, triage]
    if: needs.triage.outputs.needs_decomposition == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      subtasks: ${{ steps.create.outputs.subtasks }}
      ready_now: ${{ steps.create.outputs.ready_now }}
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - uses: Burburton/amazingteam-action@v3.0.23
        with:
          version: '3.0.23'

      - name: "Create Subtasks with Dependencies"
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIGGER_TOKEN: ${{ secrets.AMAZINGTEAM_PAT }}
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          PARENT_NUM: ${{ needs.planner.outputs.issue_num }}
          MAX_PARALLEL: ${{ env.MAX_PARALLEL }}
        run: |
          echo "=== DECOMPOSE: #$PARENT_NUM ==="
          
          DATA=$(gh issue view "$PARENT_NUM" --json title,body)
          TITLE=$(echo "$DATA" | jq -r '.title')
          BODY=$(echo "$DATA" | jq -r '.body')
          
          # Prompt explicitly requests JSON after reasoning
          PROMPT="Task: $TITLE. Description: $(echo "$BODY" | head -c 300 | tr '\n' ' '). Decompose into 2-5 subtasks with dependencies. First think about the decomposition, then output ONLY a JSON object with this exact structure (no markdown, no code blocks): {\"subtasks\":[{\"title\":\"...\",\"role\":\"architect|developer|qa\",\"depends_on\":[]}]}. Dependencies use index numbers (0=first subtask, 1=second, etc). Empty depends_on means no dependencies."
          
          ESCAPED=$(echo "$PROMPT" | jq -Rs '.')
          
          echo "Calling AI API..."
          RESULT=$(curl -s -X POST "https://coding.dashscope.aliyuncs.com/apps/anthropic/v1/messages" \
            -H "x-api-key: $AMAZINGTEAM_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"glm-5\",\"max_tokens\":2000,\"messages\":[{\"role\":\"user\",\"content\":$ESCAPED}]}" 2>&1)
          
          echo "=== Raw API Response ==="
          echo "$RESULT" | head -c 1000
          echo ""
          echo "======================="
          
          # Check if response has content array
          CONTENT_COUNT=$(echo "$RESULT" | jq '.content | length' 2>/dev/null || echo "0")
          echo "Content blocks: $CONTENT_COUNT"
          
          # Try to find text content (actual output after thinking)
          CONTENT=""
          
          # Method 1: Look for type="text" content block (actual output)
          if [ -z "$CONTENT" ]; then
            CONTENT=$(echo "$RESULT" | jq -r '.content[] | select(.type=="text") | .text' 2>/dev/null | head -1)
            if [ -n "$CONTENT" ]; then
              echo "Found text block"
            fi
          fi
          
          # Method 2: Look at all content blocks and try to extract JSON from any
          if [ -z "$CONTENT" ]; then
            for i in $(seq 0 $((CONTENT_COUNT - 1))); do
              BLOCK_TYPE=$(echo "$RESULT" | jq -r ".content[$i].type" 2>/dev/null)
              echo "Block $i type: $BLOCK_TYPE"
              
              if [ "$BLOCK_TYPE" = "text" ]; then
                CONTENT=$(echo "$RESULT" | jq -r ".content[$i].text" 2>/dev/null)
                if [ -n "$CONTENT" ]; then
                  echo "Found text in block $i"
                  break
                fi
              elif [ "$BLOCK_TYPE" = "thinking" ]; then
                THINKING_CONTENT=$(echo "$RESULT" | jq -r ".content[$i].thinking" 2>/dev/null)
                # Check if thinking contains JSON
                if echo "$THINKING_CONTENT" | grep -q '{"subtasks"'; then
                  CONTENT="$THINKING_CONTENT"
                  echo "Found JSON in thinking block $i"
                  break
                fi
              fi
            done
          fi
          
          # Method 3: Fallback - try any field
          if [ -z "$CONTENT" ]; then
            CONTENT=$(echo "$RESULT" | jq -r '.content[0].thinking // .content[0].text // .content[0].content // empty' 2>/dev/null)
          fi
          
          echo ""
          echo "=== Extracted Content (first 500 chars) ==="
          echo "$CONTENT" | head -c 500
          echo ""
          echo "=========================================="
          
          # Extract JSON from content - try direct parse first
          JSON='{"subtasks":[]}'
          
          # Method 1: Try to parse content directly as JSON
          if echo "$CONTENT" | jq -e '.subtasks' > /dev/null 2>&1; then
            JSON=$(echo "$CONTENT" | jq -c '{subtasks: .subtasks}')
            echo "Parsed JSON directly from content"
          # Method 2: Extract JSON object from content
          elif echo "$CONTENT" | grep -q '"subtasks"'; then
            # Find JSON object starting with { and containing subtasks
            EXTRACTED=$(echo "$CONTENT" | grep -oE '\{[^{}]*"subtasks"[^{}]*\[.*\][^{}]*\}' | head -1)
            if [ -n "$EXTRACTED" ] && echo "$EXTRACTED" | jq -e '.subtasks' > /dev/null 2>&1; then
              JSON="$EXTRACTED"
              echo "Extracted JSON via grep"
            else
              # Try a more lenient extraction - find anything that looks like JSON
              EXTRACTED=$(echo "$CONTENT" | tr -d '\n' | grep -oE '\{.*"subtasks".*\}' | head -1)
              if [ -n "$EXTRACTED" ] && echo "$EXTRACTED" | jq -e '.subtasks' > /dev/null 2>&1; then
                JSON="$EXTRACTED"
                echo "Extracted JSON via lenient grep"
              fi
            fi
          fi
          
          # Validate JSON - if still empty, use default
          if [ "$JSON" = '{"subtasks":[]}' ] || ! echo "$JSON" | jq -e '.subtasks' > /dev/null 2>&1; then
            echo "Warning: Could not extract valid JSON, using default decomposition"
            JSON='{"subtasks":[{"title":"Analyze and design","role":"architect","depends_on":[]},{"title":"Implement solution","role":"developer","depends_on":[0]},{"title":"Test and validate","role":"qa","depends_on":[1]}]}'
          fi
          
          echo ""
          echo "=== Decomposition Plan ==="
          echo "$JSON" | jq -r '.subtasks[]? | "  - \(.title) (\(.role), depends: \(.depends_on // []))"'
          echo "==========================="
          
          mkdir -p tasks/issue-$PARENT_NUM
          
          cat > tasks/issue-$PARENT_NUM/task.yaml << TASK_EOF
          id: issue-$PARENT_NUM
          title: "$TITLE"
          status: in_progress
          level: 0
          github_issue: $PARENT_NUM
          
          subtasks:
          TASK_EOF
          
          CREATED="[]"
          READY_NOW="[]"
          IDX=0
          
          for row in $(echo "$JSON" | jq -r '.subtasks[]? | @base64'); do
            ST_TITLE=$(echo "$row" | base64 -d | jq -r '.title')
            ST_ROLE=$(echo "$row" | base64 -d | jq -r '.role // "developer"')
            ST_DEPS=$(echo "$row" | base64 -d | jq -c '.depends_on // []')
            
            URL=$(gh issue create --title "$ST_TITLE" --body "Parent: #$PARENT_NUM\nRole: $ST_ROLE\nDependencies: $ST_DEPS")
            ST_NUM=$(echo "$URL" | grep -oP '\d+$')
            
            echo "  Created #$ST_NUM: $ST_TITLE (deps: $ST_DEPS)"
            
            CREATED=$(echo "$CREATED" | jq -c --arg num "$ST_NUM" --arg title "$ST_TITLE" --argjson deps "$ST_DEPS" '. + [{"issue": $num, "title": $title, "depends_on": $deps}]')
            
            cat >> tasks/issue-$PARENT_NUM/task.yaml << EOF
            
              - issue: $ST_NUM
                title: "$ST_TITLE"
                status: pending
                depends_on: $ST_DEPS
          EOF
            
            if [ "$ST_DEPS" = "[]" ]; then
              READY_NOW=$(echo "$READY_NOW" | jq -c --arg num "$ST_NUM" '. + [$num]')
            fi
            
            IDX=$((IDX + 1))
          done
          
          echo "" >> tasks/issue-$PARENT_NUM/task.yaml
          echo "parallel_config:" >> tasks/issue-$PARENT_NUM/task.yaml
          echo "  max_concurrent: $MAX_PARALLEL" >> tasks/issue-$PARENT_NUM/task.yaml
          
          git add tasks/
          git commit -m "feat(task): create task.yaml for #$PARENT_NUM" || true
          git push || true
          
          echo "subtasks=$CREATED" >> $GITHUB_OUTPUT
          echo "ready_now=$(echo "$READY_NOW" | jq -c '.')" >> $GITHUB_OUTPUT
          
          COUNT=$(echo "$CREATED" | jq 'length')
          READY_COUNT=$(echo "$READY_NOW" | jq 'length')
          
          gh issue comment "$PARENT_NUM" --body "## Decomposed: $COUNT subtasks\n\nReady now: $READY_COUNT\n\nSee tasks/issue-$PARENT_NUM/task.yaml"

  trigger-parallel:
    needs: [planner, decompose]
    if: needs.decompose.outputs.ready_now != '[]' && needs.decompose.outputs.ready_now != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      actions: write
    steps:
      - name: "Trigger Ready Subtasks in Parallel"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIGGER_TOKEN: ${{ secrets.AMAZINGTEAM_PAT }}
          PARENT_NUM: ${{ needs.planner.outputs.issue_num }}
          READY_SUBTASKS: ${{ needs.decompose.outputs.ready_now }}
        run: |
          echo "=== TRIGGER PARALLEL EXECUTION ==="
          echo "Parent: #$PARENT_NUM"
          echo "Ready subtasks: $READY_SUBTASKS"
          
          for ST_NUM in $(echo "$READY_SUBTASKS" | jq -r '.[]'); do
            echo "Triggering #$ST_NUM..."
            
            if [ -n "$TRIGGER_TOKEN" ]; then
              gh issue comment "$ST_NUM" --body "/oc" --token "$TRIGGER_TOKEN" || true
            else
              echo "Warning: AMAZINGTEAM_PAT not set, auto-trigger may not work"
              gh issue comment "$ST_NUM" --body "/oc" || true
            fi
            
            sleep 2
          done
          
          READY_COUNT=$(echo "$READY_SUBTASKS" | jq 'length')
          gh issue comment "$PARENT_NUM" --body "## Started $READY_COUNT parallel subtasks\n\nSubtasks triggered: $READY_SUBTASKS"

  execute:
    needs: planner
    if: needs.planner.outputs.action == 'execute_subtask'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      subtask: ${{ steps.complete.outputs.subtask }}
      status: ${{ steps.complete.outputs.status }}
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - name: "Get Task Details"
        id: task
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ needs.planner.outputs.issue_num }}
        run: |
          DATA=$(gh issue view "$ISSUE_NUM" --json title,body)
          TITLE=$(echo "$DATA" | jq -r '.title')
          BODY=$(echo "$DATA" | jq -r '.body')
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          gh issue edit "$ISSUE_NUM" --add-label "status:in-progress" || true

      - name: "Execute with AI"
        env:
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          TITLE: ${{ steps.task.outputs.title }}
          BODY: ${{ steps.task.outputs.body }}
        run: |
          echo "=== EXECUTE: $TITLE ==="
          
          PROMPT="Implement: $TITLE. Details: $(echo "$BODY" | head -c 500 | tr '\n' ' ')"
          ESCAPED=$(echo "$PROMPT" | jq -Rs '.')
          
          RESULT=$(curl -s -X POST "https://coding.dashscope.aliyuncs.com/apps/anthropic/v1/messages" \
            -H "x-api-key: $AMAZINGTEAM_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"glm-5\",\"max_tokens\":3000,\"messages\":[{\"role\":\"user\",\"content\":$ESCAPED}]}" 2>&1)
          
          echo "=== AI Response ==="
          
          # Try to find text content first
          RESPONSE=$(echo "$RESULT" | jq -r '.content[] | select(.type=="text") | .text' 2>/dev/null | head -50)
          
          # If no text, try thinking content
          if [ -z "$RESPONSE" ]; then
            RESPONSE=$(echo "$RESULT" | jq -r '.content[] | select(.type=="thinking") | .thinking' 2>/dev/null | head -50)
          fi
          
          # Fallback
          if [ -z "$RESPONSE" ]; then
            RESPONSE=$(echo "$RESULT" | jq -r '.content[0].text // .content[0].thinking // "No response"' 2>/dev/null)
          fi
          
          echo "$RESPONSE"
          echo ""
          echo "=== COMPLETE ==="

      - name: "Complete"
        id: complete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ needs.planner.outputs.issue_num }}
          PARENT_NUM: ${{ needs.planner.outputs.parent_issue }}
          COMMIT_MODE: ${{ needs.planner.outputs.commit_mode }}
        run: |
          echo "subtask=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
          gh issue edit "$ISSUE_NUM" --add-label "status:done" || true
          
          PR=$(gh pr list --author opencode-bot --state open --json url,number -q '.[0]' 2>/dev/null || echo "")
          
          if [ -n "$PR" ] && [ "$PR" != "null" ]; then
            PR_NUM=$(echo "$PR" | jq -r '.number')
            PR_URL=$(echo "$PR" | jq -r '.url')
            
            gh pr edit "$PR_NUM" --body "$(gh pr view "$PR_NUM" --json body -q '.body')\n\nCloses #$ISSUE_NUM" || true
            gh issue comment "$ISSUE_NUM" --body "## Done\n\nPR: #$PR_NUM\n$PR_URL"
            echo "status=pr_created" >> $GITHUB_OUTPUT
          else
            gh issue comment "$ISSUE_NUM" --body "## Done\n\nNo PR created. Check logs."
            echo "status=no_pr" >> $GITHUB_OUTPUT
          fi

  on-pr-merge:
    needs: planner
    if: needs.planner.outputs.action == 'pr_merged'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      next_ready: ${{ steps.check.outputs.next_ready }}
      all_done: ${{ steps.check.outputs.all_done }}
    permissions:
      issues: write
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: "Close Subtask"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBTASK: ${{ needs.planner.outputs.issue_num }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          echo "=== PR MERGED: Closing #$SUBTASK ==="
          gh issue close "$SUBTASK" --comment "Merged in PR #$PR_NUM"

      - name: "Check Parent for Next Tasks"
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PARENT: ${{ needs.planner.outputs.parent_issue }}
          TRIGGER_TOKEN: ${{ secrets.AMAZINGTEAM_PAT }}
        run: |
          echo "=== CHECK PARENT #$PARENT ==="
          
          if [ ! -f "tasks/issue-$PARENT/task.yaml" ]; then
            echo "No task.yaml found"
            echo "all_done=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          OPEN_SUBTASKS=$(gh issue list --state open --json number,body 2>/dev/null | \
            jq --arg p "$PARENT" '[.[] | select(.body | test("Parent: #" + $p)) | .number]')
          
          COUNT=$(echo "$OPEN_SUBTASKS" | jq 'length')
          echo "Open subtasks: $COUNT"
          
          if [ "$COUNT" -eq 0 ]; then
            echo "all_done=true" >> $GITHUB_OUTPUT
            gh issue close "$PARENT" --comment "## All Subtasks Complete"
          else
            READY="[]"
            
            for ST in $(echo "$OPEN_SUBTASKS" | jq -r '.[]'); do
              DEPS=$(grep -A3 "issue: $ST" tasks/issue-$PARENT/task.yaml 2>/dev/null | grep "depends_on" | head -1 | awk '{print $2}')
              
              if [ -z "$DEPS" ] || [ "$DEPS" = "[]" ]; then
                READY=$(echo "$READY" | jq --arg st "$ST" '. + [$st]')
              else
                DEP_ISSUES=$(echo "$DEPS" | jq -r '.[]' 2>/dev/null)
                ALL_DONE=true
                
                for DEP in $DEP_ISSUES; do
                  STATE=$(gh issue view "$DEP" --json state -q '.state' 2>/dev/null || echo "open")
                  if [ "$STATE" != "CLOSED" ]; then
                    ALL_DONE=false
                    break
                  fi
                done
                
                if [ "$ALL_DONE" = "true" ]; then
                  READY=$(echo "$READY" | jq --arg st "$ST" '. + [$st]')
                fi
              fi
            done
            
            echo "Ready to start: $READY"
            echo "next_ready=$(echo "$READY" | jq -c '.')" >> $GITHUB_OUTPUT
            echo "all_done=false" >> $GITHUB_OUTPUT
            
            READY_COUNT=$(echo "$READY" | jq 'length')
            if [ "$READY_COUNT" -gt 0 ]; then
              gh issue comment "$PARENT" --body "## Next Ready: $READY_COUNT subtasks\n\nTriggering..."
              
              for ST in $(echo "$READY" | jq -r '.[]'); do
                if [ -n "$TRIGGER_TOKEN" ]; then
                  gh issue comment "$ST" --body "/oc" --token "$TRIGGER_TOKEN" || true
                fi
                sleep 2
              done
            fi
          fi

  execute-direct:
    needs: [planner, triage]
    if: needs.triage.outputs.needs_decomposition == 'false' && needs.planner.outputs.action == 'triage'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - name: "Execute Simple Task"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          ISSUE_NUM: ${{ needs.planner.outputs.issue_num }}
        run: |
          echo "=== DIRECT EXECUTION: #$ISSUE_NUM ==="
          
          DATA=$(gh issue view "$ISSUE_NUM" --json title,body)
          TITLE=$(echo "$DATA" | jq -r '.title')
          BODY=$(echo "$DATA" | jq -r '.body')
          
          PROMPT="Implement: $TITLE. $(echo "$BODY" | head -c 500 | tr '\n' ' ')"
          ESCAPED=$(echo "$PROMPT" | jq -Rs '.')
          
          RESULT=$(curl -s -X POST "https://coding.dashscope.aliyuncs.com/apps/anthropic/v1/messages" \
            -H "x-api-key: $AMAZINGTEAM_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"glm-5\",\"max_tokens\":3000,\"messages\":[{\"role\":\"user\",\"content\":$ESCAPED}]}" 2>&1)
          
          echo "=== AI Response ==="
          
          # Try to find text content first
          RESPONSE=$(echo "$RESULT" | jq -r '.content[] | select(.type=="text") | .text' 2>/dev/null | head -50)
          
          # If no text, try thinking content
          if [ -z "$RESPONSE" ]; then
            RESPONSE=$(echo "$RESULT" | jq -r '.content[] | select(.type=="thinking") | .thinking' 2>/dev/null | head -50)
          fi
          
          # Fallback
          if [ -z "$RESPONSE" ]; then
            RESPONSE=$(echo "$RESULT" | jq -r '.content[0].text // .content[0].thinking // "No response"' 2>/dev/null)
          fi
          
          echo "$RESPONSE"
          
          PR=$(gh pr list --author opencode-bot --state open --json url,number -q '.[0]' 2>/dev/null || echo "")
          
          if [ -n "$PR" ] && [ "$PR" != "null" ]; then
            PR_NUM=$(echo "$PR" | jq -r '.number')
            PR_URL=$(echo "$PR" | jq -r '.url')
            gh pr edit "$PR_NUM" --body "$(gh pr view "$PR_NUM" --json body -q '.body')\n\nCloses #$ISSUE_NUM" || true
            gh issue comment "$ISSUE_NUM" --body "## Done\n\nPR: #$PR_NUM\n$PR_URL"
          else
            gh issue comment "$ISSUE_NUM" --body "## Done\n\nNo PR created."
          fi