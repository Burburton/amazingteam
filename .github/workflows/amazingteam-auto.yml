name: AmazingTeam Auto

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled, closed]
  pull_request:
    types: [closed]

env:
  OPENCODE_MODEL: bailian-coding-plan/glm-5
  MAX_PARALLEL: 3

jobs:
  planner:
    if: |
      github.event_name == 'issues' && github.event.label.name == 'ai:process' ||
      github.event_name == 'issue_comment' && contains(github.event.comment.body, '/ai') ||
      github.event_name == 'issue_comment' && contains(github.event.comment.body, '/oc') ||
      github.event_name == 'issue_comment' && contains(github.event.comment.body, '/opencode') ||
      github.event_name == 'pull_request' && github.event.pull_request.merged == true ||
      github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      action: ${{ steps.decide.outputs.action }}
      issue_num: ${{ steps.decide.outputs.issue_num }}
      parent_issue: ${{ steps.decide.outputs.parent_issue }}
      commit_mode: ${{ steps.config.outputs.commit_mode }}
    permissions:
      issues: write
      contents: read
      pull-requests: read
    steps:
      - name: "Planner Start"
        run: |
          echo "============================================"
          echo "  AmazingTeam Planner - Orchestrator"
          echo "============================================"
          echo "Event: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"

      - uses: actions/checkout@v4

      - name: "Read Config"
        id: config
        run: |
          if [ -f "amazingteam.config.yaml" ]; then
            MODE=$(grep -A10 "workflow:" amazingteam.config.yaml 2>/dev/null | grep "commit_mode:" | head -1 | awk '{print $2}' | tr -d '"' || echo "pr")
          else
            MODE="pr"
          fi
          echo "Commit Mode: $MODE"
          echo "commit_mode=$MODE" >> $GITHUB_OUTPUT

      - name: "Decide Action"
        id: decide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ""
          echo "=== ANALYZING EVENT ==="
          
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          
          case "$EVENT" in
            issue_comment)
              ISSUE_NUM="${{ github.event.issue.number }}"
              COMMENT="${{ github.event.comment.body }}"
              
              echo "Issue: #$ISSUE_NUM"
              echo "Comment: $COMMENT"
              
              DATA=$(gh issue view "$ISSUE_NUM" --json title,body,labels 2>/dev/null || echo '{}')
              TITLE=$(echo "$DATA" | jq -r '.title // "Unknown"')
              IS_SUBTASK=$(echo "$DATA" | jq -r '.body // ""' | grep -qi "parent: #" && echo "true" || echo "false")
              
              echo "Title: $TITLE"
              echo "Is Subtask: $IS_SUBTASK"
              
              if [ "$IS_SUBTASK" = "true" ]; then
                PARENT=$(echo "$DATA" | jq -r '.body // ""' | grep -oiE 'parent: #[0-9]+' | grep -oE '[0-9]+' | head -1)
                echo "Parent: #$PARENT"
                echo "action=execute_subtask" >> $GITHUB_OUTPUT
                echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
                echo "parent_issue=$PARENT" >> $GITHUB_OUTPUT
              else
                echo "action=triage" >> $GITHUB_OUTPUT
                echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
                echo "parent_issue=$ISSUE_NUM" >> $GITHUB_OUTPUT
              fi
              ;;
              
            issues)
              if [ "$ACTION" = "labeled" ] && [ "${{ github.event.label.name }}" = "ai:process" ]; then
                ISSUE_NUM="${{ github.event.issue.number }}"
                echo "Label trigger on #$ISSUE_NUM"
                echo "action=triage" >> $GITHUB_OUTPUT
                echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
                echo "parent_issue=$ISSUE_NUM" >> $GITHUB_OUTPUT
              elif [ "$ACTION" = "closed" ]; then
                ISSUE_NUM="${{ github.event.issue.number }}"
                echo "Issue #$ISSUE_NUM closed - checking for parent"
                
                DATA=$(gh issue view "$ISSUE_NUM" --json body 2>/dev/null || echo '{}')
                PARENT=$(echo "$DATA" | jq -r '.body // ""' | grep -oiE 'parent: #[0-9]+' | grep -oE '[0-9]+' | head -1)
                
                if [ -n "$PARENT" ]; then
                  echo "Subtask closed, checking parent #$PARENT for more work"
                  echo "action=check_parent" >> $GITHUB_OUTPUT
                  echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
                  echo "parent_issue=$PARENT" >> $GITHUB_OUTPUT
                else
                  echo "Parent issue closed, no action needed"
                  echo "action=none" >> $GITHUB_OUTPUT
                fi
              else
                echo "action=none" >> $GITHUB_OUTPUT
              fi
              ;;
              
            pull_request)
              PR_NUM="${{ github.event.pull_request.number }}"
              PR_BODY="${{ github.event.pull_request.body }}"
              MERGED="${{ github.event.pull_request.merged }}"
              AUTHOR="${{ github.event.pull_request.user.login }}"
              
              echo "PR: #$PR_NUM"
              echo "Merged: $MERGED"
              echo "Author: $AUTHOR"
              
              if [ "$MERGED" = "true" ] && [ "$AUTHOR" = "opencode-bot" ]; then
                SUBTASK=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+' | head -1)
                
                if [ -n "$SUBTASK" ]; then
                  echo "PR closes subtask #$SUBTASK"
                  
                  DATA=$(gh issue view "$SUBTASK" --json body 2>/dev/null || echo '{}')
                  PARENT=$(echo "$DATA" | jq -r '.body // ""' | grep -oiE 'parent: #[0-9]+' | grep -oE '[0-9]+' | head -1)
                  
                  echo "action=pr_merged" >> $GITHUB_OUTPUT
                  echo "issue_num=$SUBTASK" >> $GITHUB_OUTPUT
                  echo "parent_issue=$PARENT" >> $GITHUB_OUTPUT
                else
                  echo "action=none" >> $GITHUB_OUTPUT
                fi
              else
                echo "action=none" >> $GITHUB_OUTPUT
              fi
              ;;
              
            *)
              echo "Unknown event: $EVENT"
              echo "action=none" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: "React"
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content='eyes' || true

  triage:
    needs: planner
    if: needs.planner.outputs.action == 'triage'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      needs_decomposition: ${{ steps.analyze.outputs.needs_decomposition }}
      complexity: ${{ steps.analyze.outputs.complexity }}
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: Burburton/amazingteam-action@v3.0.23
        with:
          version: '3.0.23'

      - name: "Analyze Complexity"
        id: analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ needs.planner.outputs.issue_num }}
        run: |
          echo "=== TRIAGE: #$ISSUE_NUM ==="
          
          DATA=$(gh issue view "$ISSUE_NUM" --json title,body)
          TITLE=$(echo "$DATA" | jq -r '.title')
          BODY=$(echo "$DATA" | jq -r '.body')
          
          echo "Title: $TITLE"
          echo "Body: $(echo "$BODY" | wc -c) chars"
          
          ANALYSIS_CONTENT="$TITLE $BODY"
          
          REF_FILES=$(echo "$BODY" | grep -oE '[a-zA-Z0-9_/.-]+\.(md|txt|yaml|yml|json)' | sort -u || echo "")
          
          for ref in $REF_FILES; do
            if [ -f "$ref" ]; then
              FILE_LINES=$(wc -l < "$ref")
              echo "Found referenced file: $ref ($FILE_LINES lines)"
              
              if [ "$FILE_LINES" -gt 50 ]; then
                ANALYSIS_CONTENT="$ANALYSIS_CONTENT $(head -200 "$ref")"
              else
                ANALYSIS_CONTENT="$ANALYSIS_CONTENT $(cat "$ref")"
              fi
            fi
          done
          
          FUNCTIONAL_AREAS=0
          
          for pattern in "database|storage" "api|backend" "frontend|ui" "auth|user" "test|qa" "deploy|ci"; do
            if echo "$ANALYSIS_CONTENT" | grep -qiE "$pattern"; then
              FUNCTIONAL_AREAS=$((FUNCTIONAL_AREAS + 1))
            fi
          done
          
          LINES=$(echo "$ANALYSIS_CONTENT" | wc -l)
          CHARS=$(echo "$ANALYSIS_CONTENT" | wc -c)
          
          echo "Analysis: $LINES lines, $CHARS chars, $FUNCTIONAL_AREAS functional areas"
          
          if [ "$LINES" -gt 200 ] || [ "$CHARS" -gt 5000 ] || [ "$FUNCTIONAL_AREAS" -ge 3 ]; then
            NEEDS_DECOMP="true"
            COMPLEXITY="complex"
            REASON="$LINES lines, $CHARS chars, $FUNCTIONAL_AREAS functional areas"
          else
            NEEDS_DECOMP="false"
            COMPLEXITY="simple"
            REASON="Small scope"
          fi
          
          echo "Complexity: $COMPLEXITY"
          echo "Decomposition: $NEEDS_DECOMP"
          
          echo "needs_decomposition=$NEEDS_DECOMP" >> $GITHUB_OUTPUT
          echo "complexity=$COMPLEXITY" >> $GITHUB_OUTPUT
          
          gh issue edit "$ISSUE_NUM" --add-label "complexity:$COMPLEXITY" || true
          
          if [ "$NEEDS_DECOMP" = "true" ]; then
            gh issue comment "$ISSUE_NUM" --body "## Triage: Complex\n\n$REASON\n\nDecomposing into subtasks..."
          else
            gh issue comment "$ISSUE_NUM" --body "## Triage: Simple\n\nExecuting directly..."
          fi

  decompose:
    needs: [planner, triage]
    if: needs.triage.outputs.needs_decomposition == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      subtasks: ${{ steps.create.outputs.subtasks }}
      ready_now: ${{ steps.create.outputs.ready_now }}
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - uses: Burburton/amazingteam-action@v3.0.23
        with:
          version: '3.0.23'

      - name: "Create Subtasks with Dependencies"
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          PARENT_NUM: ${{ needs.planner.outputs.issue_num }}
          MAX_PARALLEL: ${{ env.MAX_PARALLEL }}
        run: |
          echo "=== DECOMPOSE: #$PARENT_NUM ==="
          
          DATA=$(gh issue view "$PARENT_NUM" --json title,body)
          TITLE=$(echo "$DATA" | jq -r '.title')
          BODY=$(echo "$DATA" | jq -r '.body')
          
          PROMPT="Task: $TITLE. Description: $(echo "$BODY" | head -c 300 | tr '\n' ' '). Decompose into 2-5 subtasks with dependencies. Output ONLY JSON: {\"subtasks\":[{\"title\":\"...\",\"role\":\"architect|developer|qa\",\"depends_on\":[]}]}. Dependencies use index (0=first). Empty depends_on means no dependencies."
          
          ESCAPED=$(echo "$PROMPT" | jq -Rs '.')
          
          echo "Calling AI API..."
          RESULT=$(curl -s -X POST "https://coding.dashscope.aliyuncs.com/apps/anthropic/v1/messages" \
            -H "x-api-key: $AMAZINGTEAM_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"glm-5\",\"max_tokens\":2000,\"messages\":[{\"role\":\"user\",\"content\":$ESCAPED}]}" 2>&1)
          
          echo "=== Raw API Response (first 1000 chars) ==="
          echo "$RESULT" | head -c 1000
          echo ""
          echo "======================="
          
          CONTENT_COUNT=$(echo "$RESULT" | jq '.content | length' 2>/dev/null || echo "0")
          echo "Content blocks: $CONTENT_COUNT"
          
          CONTENT=""
          
          for i in $(seq 0 $((CONTENT_COUNT - 1))); do
            BLOCK_TYPE=$(echo "$RESULT" | jq -r ".content[$i].type" 2>/dev/null)
            echo "Block $i type: $BLOCK_TYPE"
            
            BLOCK_CONTENT=""
            if [ "$BLOCK_TYPE" = "text" ]; then
              BLOCK_CONTENT=$(echo "$RESULT" | jq -r ".content[$i].text" 2>/dev/null)
            elif [ "$BLOCK_TYPE" = "thinking" ]; then
              BLOCK_CONTENT=$(echo "$RESULT" | jq -r ".content[$i].thinking" 2>/dev/null)
            fi
            
            if [ -n "$BLOCK_CONTENT" ] && echo "$BLOCK_CONTENT" | jq -e '.subtasks' > /dev/null 2>&1; then
              CONTENT="$BLOCK_CONTENT"
              echo "Found valid JSON in block $i"
              break
            fi
          done
          
          JSON='{"subtasks":[]}'
          
          if [ -n "$CONTENT" ] && echo "$CONTENT" | jq -e '.subtasks' > /dev/null 2>&1; then
            JSON=$(echo "$CONTENT" | jq -c '{subtasks: .subtasks}')
            echo "Parsed JSON directly"
          else
            echo "Warning: Using default decomposition"
            JSON='{"subtasks":[{"title":"Analyze and design","role":"architect","depends_on":[]},{"title":"Implement solution","role":"developer","depends_on":[0]},{"title":"Test and validate","role":"qa","depends_on":[1]}]}'
          fi
          
          echo ""
          echo "=== Decomposition Plan ==="
          echo "$JSON" | jq -r '.subtasks[]? | "  - \(.title) (\(.role), depends: \(.depends_on // []))"'
          echo "==========================="
          
          mkdir -p tasks/issue-$PARENT_NUM
          
          cat > tasks/issue-$PARENT_NUM/task.yaml << TASK_EOF
          id: issue-$PARENT_NUM
          title: "$TITLE"
          status: in_progress
          github_issue: $PARENT_NUM
          
          subtasks:
          TASK_EOF
          
          CREATED="[]"
          READY_NOW="[]"
          INDEX_MAP="[]"
          
          # First pass: create all issues
          for row in $(echo "$JSON" | jq -r '.subtasks[]? | @base64'); do
            ST_TITLE=$(echo "$row" | base64 -d | jq -r '.title')
            ST_ROLE=$(echo "$row" | base64 -d | jq -r '.role // "developer"')
            
            URL=$(gh issue create --title "$ST_TITLE" --body "Parent: #$PARENT_NUM\nRole: $ST_ROLE\nDependencies: (pending)")
            ST_NUM=$(echo "$URL" | grep -oE '[0-9]+$')
            
            INDEX_MAP=$(echo "$INDEX_MAP" | jq --arg num "$ST_NUM" '. + [$num]')
          done
          
          echo "Index mapping: $INDEX_MAP"
          
          # Second pass: update with dependencies and create context files
          IDX=0
          for row in $(echo "$JSON" | jq -r '.subtasks[]? | @base64'); do
            ST_TITLE=$(echo "$row" | base64 -d | jq -r '.title')
            ST_ROLE=$(echo "$row" | base64 -d | jq -r '.role // "developer"')
            ST_DEPS_IDX=$(echo "$row" | base64 -d | jq -c '.depends_on // []')
            
            ST_NUM=$(echo "$INDEX_MAP" | jq -r ".[$IDX]")
            
            ST_DEPS="[]"
            if [ "$ST_DEPS_IDX" != "[]" ]; then
              for dep_idx in $(echo "$ST_DEPS_IDX" | jq -r '.[]'); do
                DEP_NUM=$(echo "$INDEX_MAP" | jq -r ".[$dep_idx]")
                ST_DEPS=$(echo "$ST_DEPS" | jq --arg dep "$DEP_NUM" '. + [$dep]')
              done
            fi
            
            echo "  #$ST_NUM: $ST_TITLE (deps: $ST_DEPS)"
            
            # Update issue body
            gh issue edit "$ST_NUM" --body "Parent: #$PARENT_NUM\nRole: $ST_ROLE\nDependencies: $ST_DEPS"
            
            # Create context file
            mkdir -p "tasks/issue-$ST_NUM"
            cat > "tasks/issue-$ST_NUM/context.md" << CTX_EOF
          # Task: $ST_TITLE
          
          ## Issue Number
          $ST_NUM
          
          ## Parent Issue
          #$PARENT_NUM
          
          ## Role
          $ST_ROLE
          
          ## Dependencies
          $ST_DEPS
          
          ## Task Description
          $ST_TITLE - Part of parent issue #$PARENT_NUM
          
          ## Instructions for AI
          1. Read the task description above
          2. Create a branch: \`ai/issue-$ST_NUM\`
          3. Implement the changes
          4. Create a PR
          5. Reference this issue: "Closes #$ST_NUM"
          CTX_EOF
            
            # Update task.yaml
            cat >> tasks/issue-$PARENT_NUM/task.yaml << EOF
            
              - issue: $ST_NUM
                title: "$ST_TITLE"
                status: pending
                retry_count: 0
                depends_on: $ST_DEPS
          EOF
            
            CREATED=$(echo "$CREATED" | jq -c --arg num "$ST_NUM" --arg title "$ST_TITLE" --argjson deps "$ST_DEPS" '. + [{"issue": $num, "title": $title, "depends_on": $deps}]')
            
            if [ "$ST_DEPS" = "[]" ]; then
              READY_NOW=$(echo "$READY_NOW" | jq -c --arg num "$ST_NUM" '. + [$num]')
            fi
            
            IDX=$((IDX + 1))
          done
          
          echo "" >> tasks/issue-$PARENT_NUM/task.yaml
          echo "parallel_config:" >> tasks/issue-$PARENT_NUM/task.yaml
          echo "  max_concurrent: $MAX_PARALLEL" >> tasks/issue-$PARENT_NUM/task.yaml
          
          git add tasks/
          git commit -m "feat(task): create task.yaml and context files for #$PARENT_NUM" || true
          git push || true
          
          echo "subtasks=$CREATED" >> $GITHUB_OUTPUT
          echo "ready_now=$(echo "$READY_NOW" | jq -c '.')" >> $GITHUB_OUTPUT
          
          COUNT=$(echo "$CREATED" | jq 'length')
          READY_COUNT=$(echo "$READY_NOW" | jq 'length')
          
          gh issue comment "$PARENT_NUM" --body "## Decomposed: $COUNT subtasks\n\nReady now: $READY_COUNT\n\nSee tasks/issue-$PARENT_NUM/task.yaml"

  trigger-parallel:
    needs: [planner, decompose]
    if: needs.decompose.outputs.ready_now != '[]' && needs.decompose.outputs.ready_now != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      actions: write
    steps:
      - name: "Trigger Ready Subtasks in Parallel"
        env:
          GH_TOKEN: ${{ secrets.AMAZINGTEAM_PAT || secrets.GITHUB_TOKEN }}
          PARENT_NUM: ${{ needs.planner.outputs.issue_num }}
          READY_SUBTASKS: ${{ needs.decompose.outputs.ready_now }}
          REPO: ${{ github.repository }}
        run: |
          echo "=== TRIGGER PARALLEL EXECUTION ==="
          echo "Parent: #$PARENT_NUM"
          echo "Ready subtasks: $READY_SUBTASKS"
          
          for ST_NUM in $(echo "$READY_SUBTASKS" | jq -r '.[]'); do
            echo "Triggering #$ST_NUM..."
            gh issue comment "$ST_NUM" --repo "$REPO" --body "/oc" || echo "Warning: Failed to trigger #$ST_NUM"
            sleep 2
          done
          
          READY_COUNT=$(echo "$READY_SUBTASKS" | jq 'length')
          gh issue comment "$PARENT_NUM" --repo "$REPO" --body "## Started $READY_COUNT parallel subtasks\n\nSubtasks triggered: $READY_SUBTASKS"

  execute:
    needs: planner
    if: needs.planner.outputs.action == 'execute_subtask'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      issue_num: ${{ steps.context.outputs.issue_num }}
      status: ${{ steps.result.outputs.status }}
      retry_count: ${{ steps.context.outputs.retry_count }}
    permissions:
      issues: write
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - name: "Determine Issue"
        id: issue
        run: |
          echo "issue_num=${{ needs.planner.outputs.issue_num }}" >> $GITHUB_OUTPUT

      - name: "Prepare Context & Determine Base Branch"
        id: context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.issue.outputs.issue_num }}
        run: |
          echo "=== PREPARE CONTEXT: #$ISSUE_NUM ==="
          
          ISSUE_DATA=$(gh issue view "$ISSUE_NUM" --json title,body,state)
          TITLE=$(echo "$ISSUE_DATA" | jq -r '.title')
          BODY=$(echo "$ISSUE_DATA" | jq -r '.body')
          
          # Extract dependencies from body
          DEPS=$(echo "$BODY" | grep -oE 'Dependencies: \[[0-9,\s]*\]' | grep -oE '\[[0-9,\s]*\]' || echo "[]")
          
          # Use existing context file or create one
          if [ ! -f "tasks/issue-$ISSUE_NUM/context.md" ]; then
            mkdir -p "tasks/issue-$ISSUE_NUM"
            cat > "tasks/issue-$ISSUE_NUM/context.md" << EOF
          # Task: $TITLE
          
          ## Issue Number
          $ISSUE_NUM
          
          ## Task Description
          $BODY
          
          ## Dependencies
          $DEPS
          
          ## Instructions for AI
          1. Read the task description above
          2. Create a branch: \`ai/issue-$ISSUE_NUM\`
          3. Implement the changes
          4. Create a PR
          5. Reference this issue: "Closes #$ISSUE_NUM"
          EOF
            echo "Created context file"
          else
            echo "Using existing context file"
          fi
          
          # Determine base branch based on dependencies
          if [ "$DEPS" = "[]" ] || [ -z "$DEPS" ]; then
            BASE_BRANCH="main"
            echo "No dependencies, using main branch"
          else
            LAST_DEP=$(echo "$DEPS" | jq -r '.[-1]')
            DEP_BRANCH="ai/issue-$LAST_DEP"
            
            # Check if dependency branch exists
            if git ls-remote --heads origin "$DEP_BRANCH" 2>/dev/null | grep -q .; then
              BASE_BRANCH="$DEP_BRANCH"
              echo "Dependency branch exists: $DEP_BRANCH"
            else
              BASE_BRANCH="main"
              echo "Dependency branch not found, using main"
            fi
          fi
          
          echo "Base branch: $BASE_BRANCH"
          echo "base_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
          # Get retry count from task.yaml
          RETRY_COUNT=0
          if [ -f "tasks/issue-$ISSUE_NUM/task.yaml" ]; then
            RETRY_COUNT=$(grep "retry_count:" tasks/issue-$ISSUE_NUM/task.yaml 2>/dev/null | awk '{print $2}' || echo "0")
          fi
          echo "Retry count: ${RETRY_COUNT:-0}"
          echo "retry_count=${RETRY_COUNT:-0}" >> $GITHUB_OUTPUT
          
          gh issue edit "$ISSUE_NUM" --add-label "status:in-progress" || true

      - uses: Burburton/amazingteam-action@v3.0.23
        with:
          version: '3.0.23'
          config: 'amazingteam.config.yaml'

      - name: "Prepare Prompt"
        id: prompt
        env:
          ISSUE_NUM: ${{ steps.context.outputs.issue_num }}
        run: |
          # Read context file and prepare prompt
          if [ -f "tasks/issue-$ISSUE_NUM/context.md" ]; then
            PROMPT=$(cat "tasks/issue-$ISSUE_NUM/context.md")
          else
            PROMPT="Implement the task for issue #$ISSUE_NUM. Create a branch, make changes, and create a PR."
          fi
          
          # Write prompt to file for multiline support
          echo "$PROMPT" > /tmp/opencode_prompt.txt
          echo "prompt_file=/tmp/opencode_prompt.txt" >> $GITHUB_OUTPUT

      - name: "Run OpenCode"
        id: opencode
        uses: anomalyco/opencode/github@latest
        with:
          model: bailian-coding-plan/glm-5
          prompt: ${{ steps.prompt.outputs.prompt_file }}
          use_github_token: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: "Handle Result"
        id: result
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.context.outputs.issue_num }}
          OPENCODE_OUTCOME: ${{ steps.opencode.outcome }}
        run: |
          echo "=== HANDLE RESULT ==="
          echo "OpenCode outcome: $OPENCODE_OUTCOME"
          
          if [ "$OPENCODE_OUTCOME" = "success" ]; then
            PR=$(gh pr list --author opencode-bot --state open --json url,number -q '.[0]' 2>/dev/null || echo "")
            
            if [ -n "$PR" ] && [ "$PR" != "null" ]; then
              PR_NUM=$(echo "$PR" | jq -r '.number')
              PR_URL=$(echo "$PR" | jq -r '.url')
              gh issue comment "$ISSUE_NUM" --body "## ✅ Implementation Complete\n\nPR: #$PR_NUM\n$PR_URL\n\nWaiting for review and merge."
              echo "status=pr_created" >> $GITHUB_OUTPUT
            else
              gh issue comment "$ISSUE_NUM" --body "## ✅ Implementation Complete\n\nNo PR was created. Check logs."
              echo "status=no_pr" >> $GITHUB_OUTPUT
            fi
          else
            gh issue comment "$ISSUE_NUM" --body "## ⚠️ Execution Failed\n\nOpenCode encountered an error. CI Analyst will investigate."
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: "Update Task Status"
        if: always()
        env:
          ISSUE_NUM: ${{ steps.context.outputs.issue_num }}
          STATUS: ${{ steps.result.outputs.status }}
          RETRY_COUNT: ${{ steps.context.outputs.retry_count }}
        run: |
          if [ -f "tasks/issue-$ISSUE_NUM/task.yaml" ]; then
            if [ "$STATUS" = "failed" ]; then
              NEW_RETRY=$((RETRY_COUNT + 1))
              sed -i "s/retry_count:.*/retry_count: $NEW_RETRY/" tasks/issue-$ISSUE_NUM/task.yaml 2>/dev/null || \
                echo "retry_count: $NEW_RETRY" >> tasks/issue-$ISSUE_NUM/task.yaml
            fi
            git add tasks/ && git commit -m "chore: update task status for #$ISSUE_NUM" || true
            git push || true
          fi

  execute-simple:
    needs: [planner, triage]
    if: needs.planner.outputs.action == 'triage' && needs.triage.outputs.needs_decomposition == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      issue_num: ${{ steps.context.outputs.issue_num }}
      status: ${{ steps.result.outputs.status }}
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - name: "Prepare Context"
        id: context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ needs.planner.outputs.issue_num }}
        run: |
          echo "=== PREPARE CONTEXT: #$ISSUE_NUM ==="
          
          ISSUE_DATA=$(gh issue view "$ISSUE_NUM" --json title,body)
          TITLE=$(echo "$ISSUE_DATA" | jq -r '.title')
          BODY=$(echo "$ISSUE_DATA" | jq -r '.body')
          
          mkdir -p "tasks/issue-$ISSUE_NUM"
          cat > "tasks/issue-$ISSUE_NUM/context.md" << EOF
          # Task: $TITLE
          
          ## Issue Number
          $ISSUE_NUM
          
          ## Task Description
          $BODY
          
          ## Instructions for AI
          1. Read the task description above
          2. Create a branch: \`ai/issue-$ISSUE_NUM\`
          3. Implement the changes
          4. Create a PR
          5. Reference this issue: "Closes #$ISSUE_NUM"
          EOF
          
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
          
          gh issue edit "$ISSUE_NUM" --add-label "status:in-progress" || true

      - uses: Burburton/amazingteam-action@v3.0.23
        with:
          version: '3.0.23'
          config: 'amazingteam.config.yaml'

      - name: "Prepare Prompt"
        id: prompt
        env:
          ISSUE_NUM: ${{ steps.context.outputs.issue_num }}
        run: |
          # Read context file and prepare prompt
          if [ -f "tasks/issue-$ISSUE_NUM/context.md" ]; then
            PROMPT=$(cat "tasks/issue-$ISSUE_NUM/context.md")
          else
            PROMPT="Implement the task for issue #$ISSUE_NUM. Create a branch, make changes, and create a PR."
          fi
          
          # Write prompt to file for multiline support
          echo "$PROMPT" > /tmp/opencode_prompt.txt
          echo "prompt_file=/tmp/opencode_prompt.txt" >> $GITHUB_OUTPUT

      - name: "Run OpenCode"
        id: opencode
        uses: anomalyco/opencode/github@latest
        with:
          model: bailian-coding-plan/glm-5
          prompt: ${{ steps.prompt.outputs.prompt_file }}
          use_github_token: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: "Handle Result"
        id: result
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.context.outputs.issue_num }}
          OPENCODE_OUTCOME: ${{ steps.opencode.outcome }}
        run: |
          echo "=== HANDLE RESULT ==="
          echo "OpenCode outcome: $OPENCODE_OUTCOME"
          
          if [ "$OPENCODE_OUTCOME" = "success" ]; then
            PR=$(gh pr list --author opencode-bot --state open --json url,number -q '.[0]' 2>/dev/null || echo "")
            
            if [ -n "$PR" ] && [ "$PR" != "null" ]; then
              PR_NUM=$(echo "$PR" | jq -r '.number')
              PR_URL=$(echo "$PR" | jq -r '.url')
              gh issue comment "$ISSUE_NUM" --body "## ✅ Implementation Complete\n\nPR: #$PR_NUM\n$PR_URL\n\nWaiting for review and merge."
              echo "status=pr_created" >> $GITHUB_OUTPUT
            else
              gh issue comment "$ISSUE_NUM" --body "## ✅ Implementation Complete\n\nNo PR was created. Check logs."
              echo "status=no_pr" >> $GITHUB_OUTPUT
            fi
          else
            gh issue comment "$ISSUE_NUM" --body "## ⚠️ Execution Failed\n\nPlease check the workflow logs."
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

  ci-analyst:
    needs: execute
    if: needs.execute.outputs.status == 'failed'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: "Analyze Failure"
        id: analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ needs.execute.outputs.issue_num }}
          RETRY_COUNT: ${{ needs.execute.outputs.retry_count }}
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
        run: |
          echo "=== CI ANALYST: Analyzing Failure #$ISSUE_NUM ==="
          echo "Retry count: $RETRY_COUNT/3"
          
          CONTEXT=$(cat tasks/issue-$ISSUE_NUM/context.md 2>/dev/null || echo "No context file")
          
          PROMPT="Analyze this OpenCode execution failure and suggest a fix:

          Issue: #$ISSUE_NUM
          Retry: $RETRY_COUNT/3
          
          Context:
          $CONTEXT
          
          Suggest:
          1. What went wrong
          2. How to fix it
          3. Whether human intervention is needed"
          
          ESCAPED=$(echo "$PROMPT" | jq -Rs '.')
          
          RESULT=$(curl -s -X POST "https://coding.dashscope.aliyuncs.com/apps/anthropic/v1/messages" \
            -H "x-api-key: $AMAZINGTEAM_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"glm-5\",\"max_tokens\":1000,\"messages\":[{\"role\":\"user\",\"content\":$ESCAPED}]}" 2>&1)
          
          ANALYSIS=$(echo "$RESULT" | jq -r '.content[0].text // .content[0].thinking // "Analysis failed"' 2>/dev/null | head -100)
          
          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          echo "$ANALYSIS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: "Check Retry Limit"
        id: check
        run: |
          RETRY_COUNT="${{ needs.execute.outputs.retry_count }}"
          if [ "${RETRY_COUNT:-0}" -ge 3 ]; then
            echo "max_retries=true" >> $GITHUB_OUTPUT
          else
            echo "max_retries=false" >> $GITHUB_OUTPUT
          fi

      - name: "Notify Human (Max Retries Exceeded)"
        if: steps.check.outputs.max_retries == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ needs.execute.outputs.issue_num }}
        run: |
          echo "=== MAX RETRIES EXCEEDED ==="
          
          gh issue edit "$ISSUE_NUM" --add-label "status:blocked" || true
          
          gh issue comment "$ISSUE_NUM" --body "## 🚫 Max Retries Exceeded

          After 3 attempts, this issue could not be completed automatically.

          ### Analysis
          ${{ steps.analyze.outputs.analysis }}

          ### Action Required
          Human intervention needed. Downstream issues are blocked until this is resolved.

          - Comment \`/oc\` to retry manually
          - Comment \`/skip\` to skip this issue and unblock downstream"

      - name: "Retry Execution"
        if: steps.check.outputs.max_retries == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ needs.execute.outputs.issue_num }}
        run: |
          echo "=== RETRYING EXECUTION ==="
          
          gh issue comment "$ISSUE_NUM" --body "## 🔄 Retrying

          Analysis complete. Retrying execution...

          ### Analysis
          ${{ steps.analyze.outputs.analysis }}"
          
          sleep 5
          gh issue comment "$ISSUE_NUM" --body "/oc"

  on-pr-merge:
    needs: planner
    if: needs.planner.outputs.action == 'pr_merged'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      next_ready: ${{ steps.check.outputs.next_ready }}
      all_done: ${{ steps.check.outputs.all_done }}
    permissions:
      issues: write
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: "Close Subtask"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBTASK: ${{ needs.planner.outputs.issue_num }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          echo "=== PR MERGED: Closing #$SUBTASK ==="
          gh issue close "$SUBTASK" --comment "Merged in PR #$PR_NUM"

      - name: "Check Parent for Next Tasks"
        id: check
        env:
          GH_TOKEN: ${{ secrets.AMAZINGTEAM_PAT || secrets.GITHUB_TOKEN }}
          PARENT: ${{ needs.planner.outputs.parent_issue }}
        run: |
          echo "=== CHECK PARENT #$PARENT ==="
          
          if [ ! -f "tasks/issue-$PARENT/task.yaml" ]; then
            echo "No task.yaml found"
            echo "all_done=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          OPEN_SUBTASKS=$(gh issue list --state open --json number,body 2>/dev/null | \
            jq --arg p "$PARENT" '[.[] | select(.body | test("Parent: #" + $p)) | .number]')
          
          COUNT=$(echo "$OPEN_SUBTASKS" | jq 'length')
          echo "Open subtasks: $COUNT"
          
          if [ "$COUNT" -eq 0 ]; then
            echo "all_done=true" >> $GITHUB_OUTPUT
            gh issue close "$PARENT" --comment "## ✅ All Subtasks Complete"
          else
            READY="[]"
            
            for ST in $(echo "$OPEN_SUBTASKS" | jq -r '.[]'); do
              DEPS=$(grep -A3 "issue: $ST" tasks/issue-$PARENT/task.yaml 2>/dev/null | grep "depends_on" | head -1 | awk '{print $2}')
              
              if [ -z "$DEPS" ] || [ "$DEPS" = "[]" ]; then
                READY=$(echo "$READY" | jq --arg st "$ST" '. + [$st]')
              else
                DEP_ISSUES=$(echo "$DEPS" | jq -r '.[]' 2>/dev/null)
                ALL_DONE=true
                
                for DEP in $DEP_ISSUES; do
                  STATE=$(gh issue view "$DEP" --json state -q '.state' 2>/dev/null || echo "open")
                  if [ "$STATE" != "CLOSED" ]; then
                    ALL_DONE=false
                    break
                  fi
                done
                
                if [ "$ALL_DONE" = "true" ]; then
                  READY=$(echo "$READY" | jq --arg st "$ST" '. + [$st]')
                fi
              fi
            done
            
            echo "Ready to start: $READY"
            echo "next_ready=$(echo "$READY" | jq -c '.')" >> $GITHUB_OUTPUT
            echo "all_done=false" >> $GITHUB_OUTPUT
            
            READY_COUNT=$(echo "$READY" | jq 'length')
            if [ "$READY_COUNT" -gt 0 ]; then
              gh issue comment "$PARENT" --body "## Next Ready: $READY_COUNT subtasks\n\nTriggering..."
              
              for ST in $(echo "$READY" | jq -r '.[]'); do
                gh issue comment "$ST" --body "/oc" || echo "Warning: Failed to trigger #$ST"
                sleep 2
              done
            fi
          fi

  check-parent:
