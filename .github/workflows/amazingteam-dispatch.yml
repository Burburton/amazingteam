name: AmazingTeam Dispatch

on:
  issue_comment:
    types: [created]

jobs:
  dispatch:
    if: startsWith(github.event.comment.body, '/dispatch')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - name: React
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content='eyes' || true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - uses: Burburton/amazingteam-action@v3.0.20
        with:
          version: '3.0.20'

      - name: Find next subtask
        id: find
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          SUBTASKS=$(gh issue list --label "type:subtask" --state open --json number,title --jq '.[] | select(.title | contains("Parent: #$ISSUE_NUM")) | .number' 2>/dev/null || echo "")
          
          if [ -z "$SUBTASKS" ]; then
            echo "No open subtasks found"
            gh issue comment "$ISSUE_NUM" --body "## No Open Subtasks\n\nAll subtasks completed or no subtasks found."
            exit 0
          fi
          
          NEXT=$(echo "$SUBTASKS" | head -1)
          echo "next_subtask=$NEXT" >> $GITHUB_OUTPUT

      - uses: anomalyco/opencode/github@latest
        if: steps.find.outputs.next_subtask != ''
        env:
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: bailian-coding-plan/glm-5
          use_github_token: true

      - name: Post result
        if: steps.find.outputs.next_subtask != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBTASK_NUM: ${{ steps.find.outputs.next_subtask }}
          PARENT_NUM: ${{ github.event.issue.number }}
        run: |
          PR=$(gh pr list --author opencode-bot --state open --json url -q '.[0].url' 2>/dev/null || echo "")
          gh issue comment "$SUBTASK_NUM" --body "## Done\n\nPR: ${PR:-None}" || true
          gh issue comment "$PARENT_NUM" --body "## Subtask #$SUBTASK_NUM Complete\n\nPR: ${PR:-None}\n\nUse \`/dispatch\` for next subtask." || true