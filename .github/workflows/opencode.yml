name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      startsWith(github.event.comment.body, '/ai') ||
      startsWith(github.event.comment.body, '/opencode') ||
      startsWith(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: React to comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='eyes' || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          AMAZINGTEAM_API_KEY: ${{ secrets.AMAZINGTEAM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: bailian-coding-plan/glm-5
          use_github_token: true

      - name: Post summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          
          # Check for open PRs by opencode-bot
          PR_URL=$(gh pr list --author opencode-bot --state open --json url -q '.[0].url' 2>/dev/null || true)
          
          # Post comment to issue
          if [ -n "$ISSUE_NUMBER" ]; then
            if [ -n "$PR_URL" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
          ## ✅ OpenCode Workflow Complete
          
          📎 **Pull Request:** ${PR_URL}
          EOF
          )"
            else
              gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
          ## ✅ OpenCode Workflow Complete
          
          No pull request was created. Check the logs for details.
          EOF
          )"
            fi
          fi