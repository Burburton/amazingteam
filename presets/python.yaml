# Python Configuration Preset
# For Python backend projects

$preset: "default"

project:
  language: "python"
  framework: "fastapi"

build:
  command: "python -m build"
  test: "pytest"
  lint: "ruff check ."
  typecheck: "mypy ."

rules:
  test_coverage_threshold: 80
  max_function_lines: 30
  commit_convention: "conventional"
  python:
    max_line_length: 88
    docstring_style: "google"

agents:
  developer:
    skills: ["test-first-feature-dev", "bugfix-playbook"]
    memory:
      write: [".ai-team/memory/developer/", "tasks/{task_id}/implementation.md", "src/", "tests/"]

  qa:
    skills: ["test-first-feature-dev", "regression-checklist"]
    memory:
      write: [".ai-team/memory/qa/", "tasks/{task_id}/validation.md", "tests/"]

integrations:
  ci:
    enabled: true
    require_passing: true
    commands:
      install: "pip install -r requirements.txt"
      build: "python -m build"
      test: "pytest --cov"
      lint: "ruff check . && mypy ."