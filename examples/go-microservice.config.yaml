# 示例：Go 微服务项目配置

project:
  name: "my-microservice"
  description: "A Go microservice"
  language: "go"
  framework: "gin"

ai_team:
  version: "1.0.0"
  
  agents:
    architect: true
    developer: true
    qa: true
    reviewer: true

  memory:
    enabled: true
    isolation: true
    auto_archive: true

  workflows:
    auto_trigger: true
    require_human_approval: true

rules:
  coding:
    max_function_lines: 50
    max_nesting_levels: 4
    test_coverage_threshold: 70
  
  git:
    branch_prefix:
      feature: "feat/"
      bugfix: "fix/"
      refactor: "refactor/"
      tech: "tech/"
    commit_convention: "conventional"

  safety:
    no_force_push: true
    no_direct_main: true
    require_pr_reviews: 1

# Go 特定配置
go:
  version: "1.21"
  linter: "golangci-lint"
  test_framework: "testing"

template:
  source: "https://github.com/your-org/ai-team-template.git"
  version: "1.0.0"
  last_sync: null