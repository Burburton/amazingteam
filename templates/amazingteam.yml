# AmazingTeam GitHub Action Workflow
# This workflow enables AI-powered development in your repository
#
# Template Variables:
#   {{AMAZINGTEAM_VERSION}} - Foundation version (e.g., "3.0.0")
#   {{PROJECT_NAME}} - Your project name
#   {{PROJECT_DESCRIPTION}} - Project description
#
# After running `amazingteam init`, these variables will be replaced with actual values.
# You can change the GitHub Action reference if using your own fork.

name: AmazingTeam

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  amazingteam:
    # Trigger on /ai or /opencode commands
    if: |
      startsWith(github.event.comment.body, '/ai') ||
      startsWith(github.event.comment.body, '/opencode') ||
      startsWith(github.event.comment.body, '/oc')
    
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: React to comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Add 👀 reaction to show we're working on it
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='eyes' || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "opencode-bot"
          git config --global user.email "opencode-bot@users.noreply.github.com"

      # Setup AmazingTeam Foundation
      # Change this if using your own fork of amazingteam-action
      - name: Setup AmazingTeam
        uses: Burburton/amazingteam-action@v1
        with:
          version: '{{AMAZINGTEAM_VERSION}}'
          config: 'amazingteam.config.yaml'
          # Uncomment to use a specific overlay:
          # overlay: 'python-backend'

      # Run OpenCode with AmazingTeam capabilities
      - name: Run OpenCode
        id: opencode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get issue number
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          
          # Check if a PR was created
          PR_URL=""
          if git log -1 --pretty=%B | grep -q "Pull Request"; then
            PR_URL=$(git log -1 --pretty=%B | grep -oE 'https://github.com/[^ ]+pull/[0-9]+' || true)
          fi
          
          # Check for open PRs by opencode-bot
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr list --author opencode-bot --state open --json url -q '.[0].url' 2>/dev/null || true)
          fi
          
          # Post comment to issue
          if [ -n "$ISSUE_NUMBER" ]; then
            if [ -n "$PR_URL" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
          ## ✅ AmazingTeam Workflow Complete
          
          📎 **Pull Request:** ${PR_URL}
          EOF
          )"
            else
              gh issue comment "$ISSUE_NUMBER" --body "$(cat <<EOF
          ## ✅ AmazingTeam Workflow Complete
          
          No pull request was created. Check the logs for details.
          EOF
          )"
            fi
          fi

  # Optional: CI check on AI-created PRs
  amazingteam-ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run CI
        run: |
          echo "Running CI checks..."
          # Add your CI commands here
          # npm ci && npm test && npm run lint